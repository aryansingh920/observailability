replicaCount: 1

image:
  repository: chentex/random-logger
  tag: latest

# Add these — your deployment.yaml template needs to support command/args override
command: ["/bin/sh"]
args:
  - "-c"
  - "while true; do random-logger --log-group-size=10; sleep 5; done"

config:
  logGroupSize: 10
  lastLogGroupSize: 10
  sleepTime: 500
